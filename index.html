<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Manuel Font</title>
    <link
      rel="stylesheet"
      href="./assets/output.css"
    />
  </head>
  <body
    class="bg-portrait-olive mx-auto min-h-dvh max-w-xl py-5"
  >
    <header class="text-portrait-cream">
      <img
        alt="Foto Manuel Font"
        src="./assets/me-3.webp"
        class="animate-pulse-fade-in mx-auto block h-96 rounded-full mask-[radial-gradient(circle,var(--color-portrait-espresso)_50%,transparent_70%)] object-cover"
      />

      <div
        class="-mt-10 mb-8 flex flex-col items-center justify-center"
      >
        <span
          class="border-portrait-cream/40 bg-portrait-espresso/85 text-portrait-leaf z-10 flex cursor-cell items-center justify-center rounded-full border px-3 py-1 font-mono text-xl"
        >
          @manuelfont
          <svg
            class="text-portrait-leaf ml-1 inline h-5 w-5"
            viewBox="0 0 20 20"
            fill="currentColor"
          >
            <path
              fill-rule="evenodd"
              d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z"
              clip-rule="evenodd"
            />
          </svg>
        </span>

        <h1
          class="mt-10 text-3xl leading-tight font-extrabold"
        >
          Manuel Font
        </h1>
      </div>

      <section
        class="-mt-4 mb-10 flex justify-center gap-2"
      >
        <a
          class="social-button bg-portrait-espresso text-portrait-cream"
          href="https://github.com/manuelfont"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Github"
          title="Github de Manuel Font"
        >
          <svg width="28" height="28">
            <use
              xlink:href="./assets/sprite.svg#github"
            />
          </svg>
        </a>

        <a
          class="social-button bg-portrait-cream text-portrait-teal"
          href="https://www.linkedin.com/in/manuel-font-"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="LinkedIn"
          title="LinkedIn de Manuel Font"
        >
          <svg width="28" height="28">
            <use
              xlink:href="./assets/sprite.svg#linkedin"
            />
          </svg>
        </a>

        <a
          class="social-button bg-portrait-wood text-portrait-cream"
          href="mailto:font.manuel2004@gmail.com"
          aria-label="Mail"
          title="Enviar mail a font.manuel2004@gmail.com"
        >
          <svg width="28" height="28">
            <use
              xlink:href="./assets/sprite.svg#mail"
            />
          </svg>
        </a>

        <a
          class="social-button bg-portrait-teal text-portrait-cream"
          href="https://wa.me/59895772777"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="WhatsApp"
          title="WhatsApp de Manuel Font"
        >
          <svg width="28" height="28">
            <use
              xlink:href="./assets/sprite.svg#whatsapp"
            />
          </svg>
        </a>
      </section>

      <p
        class="text-md mt-4 px-4 text-center text-balance"
      >
        I enjoy building software that
        feels good to use and the
        systems that make it work.
        <br /><br />☕️
        <i>Turning coffee into code</i>
      </p>

          <a
